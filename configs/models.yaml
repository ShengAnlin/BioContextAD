# Model Role Configuration
# Edit model names here — no code changes required

roles:
  router:
    model: deepseek-chat
    provider: deepseek
    temperature: 0.0
    max_tokens: 256
    description: "Query classification across AD pathological axes"

  rag:
    model: claude-sonnet-4-6
    provider: anthropic
    temperature: 0.1
    max_tokens: 1024
    description: "Biomarker-guided evidence retrieval and answer generation"

  abstention:
    model: claude-sonnet-4-6
    provider: anthropic
    temperature: 0.0
    max_tokens: 512
    description: "Safety/uncertainty gate for unanswerable queries"

  evidence:
    model: qwen-plus
    provider: dashscope
    temperature: 0.0
    max_tokens: 512
    description: "Evidence extraction and structured output"

  teacher_1:
    model: claude-sonnet-4-6
    provider: anthropic
    temperature: 0.3
    max_tokens: 1024

  teacher_2:
    model: gpt-4.1
    provider: openai
    temperature: 0.3
    max_tokens: 1024

  teacher_3:
    model: baichuan-m3-turbo
    provider: baichuan
    temperature: 0.3
    max_tokens: 1024

  report:
    model: moonshot-v1-32k
    provider: moonshot
    temperature: 0.2
    max_tokens: 4096
    description: "Weekly report and long-document summarization"
